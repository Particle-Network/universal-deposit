<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Bridge Widget</title>
    <style>
        :root {
            --bg-body: #000000;
            --bg-widget: #09090b;
            --bg-panel: #121212;
            --bg-hover: #27272a;
            --bg-input: #18181b;
            --border: #27272a;
            --border-highlight: #3f3f46;
            --primary: #fff;
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --text-dim: #52525b;
            --accent-blue: #3b82f6;
            --radius-outer: 20px;
            --radius-inner: 12px;
            --font-mono: 'SF Mono', 'Menlo', 'Monaco', 'Courier New', monospace;
            --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }

        body {
            background-color: var(--bg-body);
            background-image: radial-gradient(circle at 50% 0%, #1a1a1a 0%, #000 60%);
            color: var(--text-main);
            font-family: var(--font-sans);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* --- Main Widget --- */
        .widget {
            position: relative;
            width: 380px;
            background: var(--bg-widget);
            border: 1px solid var(--border);
            border-radius: var(--radius-outer);
            box-shadow: 0 40px 80px -20px rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header (Connected Wallet) */
        .header {
            padding: 20px 24px 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h2 { font-size: 15px; font-weight: 600; color: var(--text-main); }

        .wallet-pill {
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 6px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .wallet-pill:hover { border-color: var(--border-highlight); background: var(--bg-hover); }

        .status-dot { width: 6px; height: 6px; background: #4ade80; border-radius: 50%; box-shadow: 0 0 8px rgba(74, 222, 128, 0.4); }
        .wallet-addr { font-size: 12px; font-family: var(--font-mono); color: var(--text-muted); }
        
        /* Main Panel (Asset List) */
        .panel {
            margin: 0 24px;
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: var(--radius-inner);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Destination Context Bar */
        .context-bar {
            padding: 12px 16px;
            background: var(--bg-input);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 12px;
        }
        .context-label { color: var(--text-muted); }
        .context-val { display: flex; align-items: center; gap: 6px; font-weight: 600; color: var(--text-main); }
        .tiny-icon { width: 14px; height: 14px; border-radius: 50%; }

        /* Asset Rows */
        .asset-list {
            display: flex;
            flex-direction: column;
        }

        .asset-row {
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            transition: background 0.1s;
        }
        .asset-row:last-child { border-bottom: none; }
        .asset-row:hover { background: rgba(255,255,255,0.02); }

        /* Left Side: Icon Stack & Name */
        .row-left { display: flex; align-items: center; gap: 12px; }

        .icon-stack { position: relative; width: 32px; height: 32px; }
        .token-img { width: 32px; height: 32px; border-radius: 50%; background: #333; }
        .chain-badge {
            position: absolute; bottom: -2px; right: -2px;
            width: 14px; height: 14px; border-radius: 50%;
            border: 2px solid var(--bg-panel);
            background: #000;
        }

        .asset-info { display: flex; flex-direction: column; gap: 2px; }
        .asset-name { font-size: 13px; font-weight: 600; color: var(--text-main); }
        .asset-chain { font-size: 11px; color: var(--text-muted); display: flex; align-items: center; gap: 4px; }
        
        /* Right Side: Balance & Button */
        .row-right { display: flex; align-items: center; gap: 12px; }

        .balance-info { text-align: right; }
        .bal-val { font-size: 13px; font-weight: 500; font-family: var(--font-mono); color: var(--text-main); }
        .bal-usd { font-size: 11px; color: var(--text-dim); }

        .bridge-btn {
            background: var(--primary);
            color: #000;
            border: none;
            border-radius: 6px;
            height: 28px;
            padding: 0 12px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
            min-width: 64px;
        }
        .bridge-btn:hover { opacity: 0.9; }
        .bridge-btn:active { transform: scale(0.96); }
        
        .bridge-btn.loading {
            background: var(--bg-hover);
            color: var(--text-muted);
            cursor: wait;
            pointer-events: none;
        }

        /* --- History Section --- */
        .history-section {
            margin-top: 24px;
            border-top: 1px solid var(--border);
            background: var(--bg-panel);
        }

        .hist-header {
            padding: 16px 24px 8px 24px;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .hist-list { display: flex; flex-direction: column; }

        .hist-item {
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }
        .hist-item:last-child { border-bottom: none; }

        .hist-left { display: flex; align-items: center; gap: 12px; }
        
        .hist-icon-box {
            width: 28px; height: 28px;
            border-radius: 50%;
            background: var(--bg-input);
            border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            color: var(--text-muted);
        }
        
        .hist-info h4 { font-size: 13px; font-weight: 500; color: var(--text-main); margin-bottom: 2px; }
        .hist-info p { font-size: 11px; color: var(--text-muted); }

        .hist-status { font-size: 11px; font-weight: 500; color: var(--text-muted); display: flex; align-items: center; gap: 6px; }
        .dot-pending { width: 6px; height: 6px; background: #f59e0b; border-radius: 50%; }
        .dot-success { width: 6px; height: 6px; background: #4ade80; border-radius: 50%; }

    </style>
</head>
<body>

    <div class="widget">
        <div class="header">
            <h2>Bridge Assets</h2>
            <div class="wallet-pill">
                <div class="status-dot"></div>
                <span class="wallet-addr">0x71C...9A2</span>
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
            </div>
        </div>

        <div class="panel">
            <div class="context-bar">
                <span class="context-label">Detected on other chains</span>
                <div class="context-val">
                    To 
                    <svg class="tiny-icon" viewBox="0 0 24 24" fill="#12aaeb"><circle cx="12" cy="12" r="12"/></svg>
                    Arbitrum
                </div>
            </div>

            <div class="asset-list">
                
                <div class="asset-row">
                    <div class="row-left">
                        <div class="icon-stack">
                            <svg class="token-img" viewBox="0 0 24 24" fill="#2775ca"><circle cx="12" cy="12" r="12"/></svg>
                            <svg class="chain-badge" viewBox="0 0 24 24" fill="#ff0420"><circle cx="12" cy="12" r="12"/></svg>
                        </div>
                        <div class="asset-info">
                            <span class="asset-name">USDC</span>
                            <span class="asset-chain">Optimism</span>
                        </div>
                    </div>
                    <div class="row-right">
                        <div class="balance-info">
                            <div class="bal-val">1,420.00</div>
                            <div class="bal-usd">≈$1,420</div>
                        </div>
                        <button class="bridge-btn" onclick="bridge(this)">Bridge</button>
                    </div>
                </div>

                <div class="asset-row">
                    <div class="row-left">
                        <div class="icon-stack">
                            <svg class="token-img" viewBox="0 0 24 24" fill="#26a17b"><circle cx="12" cy="12" r="12"/></svg>
                            <svg class="chain-badge" viewBox="0 0 24 24" fill="#8247E5"><circle cx="12" cy="12" r="12"/></svg>
                        </div>
                        <div class="asset-info">
                            <span class="asset-name">USDT</span>
                            <span class="asset-chain">Polygon</span>
                        </div>
                    </div>
                    <div class="row-right">
                        <div class="balance-info">
                            <div class="bal-val">540.00</div>
                            <div class="bal-usd">≈$540</div>
                        </div>
                        <button class="bridge-btn" onclick="bridge(this)">Bridge</button>
                    </div>
                </div>

                <div class="asset-row">
                    <div class="row-left">
                        <div class="icon-stack">
                            <svg class="token-img" viewBox="0 0 24 24" fill="#627eea"><circle cx="12" cy="12" r="12"/></svg>
                            <svg class="chain-badge" viewBox="0 0 24 24" fill="#0052FF"><circle cx="12" cy="12" r="12"/></svg>
                        </div>
                        <div class="asset-info">
                            <span class="asset-name">ETH</span>
                            <span class="asset-chain">Base</span>
                        </div>
                    </div>
                    <div class="row-right">
                        <div class="balance-info">
                            <div class="bal-val">0.45</div>
                            <div class="bal-usd">≈$1,100</div>
                        </div>
                        <button class="bridge-btn" onclick="bridge(this)">Bridge</button>
                    </div>
                </div>

            </div>
        </div>

        <div class="history-section">
            <div class="hist-header">Bridge History</div>
            <div class="hist-list">
                
                <div class="hist-item">
                    <div class="hist-left">
                        <div class="hist-icon-box">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>
                        </div>
                        <div class="hist-info">
                            <h4>Bridged USDC</h4>
                            <p>From Ethereum • 2m ago</p>
                        </div>
                    </div>
                    <div class="hist-status">
                        <div class="dot-success"></div> Done
                    </div>
                </div>

                <div class="hist-item">
                    <div class="hist-left">
                        <div class="hist-icon-box">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                        </div>
                        <div class="hist-info">
                            <h4>Bridging WETH</h4>
                            <p>From BSC • 5m ago</p>
                        </div>
                    </div>
                    <div class="hist-status">
                        <div class="dot-pending"></div> 1/3
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        function bridge(btn) {
            const originalText = btn.innerText;
            
            // Loading State
            btn.innerText = "Signing";
            btn.classList.add('loading');
            
            // Mock Interaction
            setTimeout(() => {
                btn.innerText = "Sent";
                btn.style.background = "#4ade80"; // Success Green
                btn.style.color = "black";
                btn.classList.remove('loading');
                
                // Reset after delay
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.style.background = "";
                    btn.style.color = "";
                    btn.classList.remove('loading');
                }, 3000);
            }, 1500);
        }
    </script>
</body>
</html>
